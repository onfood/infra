name: validate

on:
  push:
    branches: [development, main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose
        run: |
          # env_file paths point at the server layout (../env/*.env); create
          # empty stand-ins so `config` can resolve them during validation.
          mkdir -p ../env
          for f in backend eats business adminpanel; do touch "../env/$f.env"; done
          docker compose -f docker-compose.yml --env-file env/.env.example config -q

      - name: Shellcheck scripts
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck -S error scripts/*.sh
