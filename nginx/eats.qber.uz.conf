# /etc/nginx/sites-available/eats.qber.uz
# Customer-facing Next.js app

server {
    listen 80;
    listen [::]:80;
    server_name eats.qber.uz;

    # ACME http-01 challenge files (certbot writes here)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS (after cert is in place)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name eats.qber.uz;

    ssl_certificate     /etc/letsencrypt/live/eats.qber.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eats.qber.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Increase client body size for image uploads (avatars, etc.)
    client_max_body_size 20m;

    # Gzip
    gzip on;
    gzip_proxied any;
    gzip_types text/plain application/json application/javascript text/css text/xml application/xml application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Websocket / Server-sent events support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
}
