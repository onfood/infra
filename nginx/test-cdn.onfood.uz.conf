# /etc/nginx/sites-available/test-cdn.onfood.uz
# Public S3-compatible object storage (MinIO) — test environment.
# Browser uploads via presigned PUT and reads public images here. The backend
# signs URLs for host test-cdn.onfood.uz, so nginx must forward the Host header
# unchanged for the MinIO signature to validate.

server {
    listen 80;
    listen [::]:80;
    server_name test-cdn.onfood.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name test-cdn.onfood.uz;

    ssl_certificate     /etc/letsencrypt/live/test-cdn.onfood.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test-cdn.onfood.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Allow large image uploads via presigned PUT
    client_max_body_size 50m;
    # Stream uploads straight to MinIO (don't buffer big bodies on disk)
    proxy_request_buffering off;
    ignore_invalid_headers off;

    location / {
        proxy_pass http://127.0.0.1:3025;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}
