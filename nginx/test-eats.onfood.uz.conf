# /etc/nginx/sites-available/test-eats.onfood.uz
# Customer-facing Next.js app (eats) — test environment.

server {
    listen 80;
    listen [::]:80;
    server_name test-eats.onfood.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name test-eats.onfood.uz;

    ssl_certificate     /etc/letsencrypt/live/test-eats.onfood.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test-eats.onfood.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20m;

    gzip on;
    gzip_proxied any;
    gzip_types text/plain application/json application/javascript text/css text/xml application/xml application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    location / {
        proxy_pass http://127.0.0.1:3010;
        include /etc/nginx/snippets/onfood-proxy.conf;
        proxy_read_timeout 300s;
    }
}
