# /etc/nginx/sites-available/test-api.onfood.uz
# Centralized backend API gateway — test environment.
# Path-based routing to the two Go HTTP servers + the two bot webhook servers.
#
#   /eats/api/v1/*        → eats-api      (3020, prefix stripped)
#   /eats/internal/*      → 404            (service-only routes stay private)
#   /business/*           → business-api  (3021, prefix stripped → /api/v1/...)
#
# Frontends call this host: NEXT_PUBLIC_BACKEND_URL=https://test-api.onfood.uz/eats
# Adminpanel talks to postgres directly (no Go API), so there is no /admin/ here.
# Bots run in long-poll mode on test (ENV=dev), so there are no /webhooks/* routes.

server {
    listen 80;
    listen [::]:80;
    server_name test-api.onfood.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name test-api.onfood.uz;

    ssl_certificate     /etc/letsencrypt/live/test-api.onfood.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test-api.onfood.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    client_max_body_size 20m;

    gzip on;
    gzip_proxied any;
    gzip_types application/json text/plain;
    gzip_min_length 1024;

    location = / {
        return 404;
    }

    # ── Eats API ──────────────────────────────────────────────────────
    # Service-only routes must never cross the public test gateway.
    location ^~ /eats/internal/ {
        return 404;
    }

    location /eats/ {
        rewrite ^/eats/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3020;
        include /etc/nginx/snippets/onfood-proxy.conf;
    }

    # ── Business API ──────────────────────────────────────────────────
    location /business/ {
        rewrite ^/business/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3021;
        include /etc/nginx/snippets/onfood-proxy.conf;
    }
}
