# /etc/nginx/sites-available/cdn.onfood.uz
# Public S3-compatible MinIO endpoint for images and story media.

server {
    listen 80;
    listen [::]:80;
    server_name cdn.onfood.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cdn.onfood.uz;

    ssl_certificate     /etc/letsencrypt/live/cdn.onfood.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cdn.onfood.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100m;
    proxy_request_buffering off;
    ignore_invalid_headers off;

    location / {
        proxy_pass http://127.0.0.1:4025;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}
