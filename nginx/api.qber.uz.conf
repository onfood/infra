# /etc/nginx/sites-available/api.qber.uz
# Backend API gateway. Path-based routing to 3 separate Go binaries.
#
#   /customer/*  →  customer-api  (port 3020)
#   /business/*  →  business-api  (port 3021)
#   /admin/*     →  admin-api     (port 3022)
#
# nginx strips the prefix before proxying so each backend handles its
# own canonical paths (e.g. /api/v1/auth/initdata).

server {
    listen 80;
    listen [::]:80;
    server_name api.qber.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.qber.uz;

    ssl_certificate     /etc/letsencrypt/live/api.qber.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.qber.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # Webhook payloads (Click/Payme) can be moderate
    client_max_body_size 5m;

    gzip on;
    gzip_proxied any;
    gzip_types application/json text/plain;
    gzip_min_length 1024;

    # Default: nothing at root
    location = / {
        return 404;
    }

    location /customer/ {
        rewrite ^/customer/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3020;
        include /etc/nginx/snippets/qber-proxy.conf;
    }

    location /business/ {
        rewrite ^/business/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3021;
        include /etc/nginx/snippets/qber-proxy.conf;
    }

    location /admin/ {
        rewrite ^/admin/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3022;
        include /etc/nginx/snippets/qber-proxy.conf;
    }
}
