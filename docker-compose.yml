name: onfood-dev

# OnFood TEST/STAGING stack — runs on the shared `tamweel` host (84.247.143.87)
# alongside other projects. Everything is namespaced `onfood-dev-*` and binds
# only to 127.0.0.1 so the host nginx can reverse-proxy each service. Postgres
# and redis are NOT published to the host (host already has bare-metal 5432/6379).
#
# Images are built in CI and pulled from ghcr.io/onfood/*:dev — never built here.
#
# Public routing (host nginx + Let's Encrypt, see ../nginx/):
#   test-eats.onfood.uz       → eats        (127.0.0.1:3010)
#   test-business.onfood.uz   → business    (127.0.0.1:3011)
#   test-admin.onfood.uz      → adminpanel  (127.0.0.1:3012)
#   test-cdn.onfood.uz        → minio       (127.0.0.1:3025)
#   test-api.onfood.uz/eats/*      → eats-api      (127.0.0.1:3020, prefix stripped)
#   test-api.onfood.uz/business/*  → business-api  (127.0.0.1:3021, prefix stripped)
# Bots (eats-bot, business-bot) run in long-poll mode on test (ENV=dev) — they
# have no inbound port and no nginx webhook route.

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-go-depends: &go-depends
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  migrate:
    condition: service_completed_successfully

services:
  # ────────────────────────────────────────────────────────────────
  # Infrastructure
  # ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: onfood-dev-postgres
    <<: [*restart, *logging]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [onfood-dev]

  redis:
    image: redis:7-alpine
    container_name: onfood-dev-redis
    <<: [*restart, *logging]
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [onfood-dev]

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: onfood-dev-minio
    <<: [*restart, *logging]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:3025:9000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [onfood-dev]

  # One-shot: keep images public and story raw/moderation objects private.
  minio-setup:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    <<: *logging
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/${R2_BUCKET:-onfood-images} &&
      mc anonymous set download local/${R2_BUCKET:-onfood-images} &&
      mc mb --ignore-existing local/${STORY_PRIVATE_S3_BUCKET:-onfood-story-private} &&
      mc anonymous set none local/${STORY_PRIVATE_S3_BUCKET:-onfood-story-private} &&
      mc mb --ignore-existing local/${STORY_PUBLIC_S3_BUCKET:-onfood-images} &&
      mc anonymous set download local/${STORY_PUBLIC_S3_BUCKET:-onfood-images}
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    restart: "no"
    networks: [onfood-dev]

  # ────────────────────────────────────────────────────────────────
  # Migrations (one-shot job, runs on every backend/migrations deploy)
  # ────────────────────────────────────────────────────────────────
  migrate:
    image: ghcr.io/onfood/migrations:dev
    container_name: onfood-dev-migrate
    <<: *logging
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    restart: "no"
    networks: [onfood-dev]

  # ────────────────────────────────────────────────────────────────
  # Backend (Go) — 5 services from 5 separate images, one shared env file
  # ────────────────────────────────────────────────────────────────
  eats-api:
    image: ghcr.io/onfood/eats-api:dev
    container_name: onfood-dev-eats-api
    <<: [*restart, *logging]
    depends_on: *go-depends
    env_file: ../env/backend.env
    ports:
      - "127.0.0.1:3020:8001"
    networks: [onfood-dev]

  business-api:
    image: ghcr.io/onfood/business-api:dev
    container_name: onfood-dev-business-api
    <<: [*restart, *logging]
    depends_on: *go-depends
    env_file: ../env/backend.env
    ports:
      - "127.0.0.1:3021:8002"
    networks: [onfood-dev]

  # Bots run in long-poll mode on test (ENV=dev), so they need no inbound port
  # or webhook route — they connect out to Telegram themselves.
  eats-bot:
    image: ghcr.io/onfood/eats-bot:dev
    container_name: onfood-dev-eats-bot
    <<: [*restart, *logging]
    depends_on: *go-depends
    env_file: ../env/backend.env
    networks: [onfood-dev]

  business-bot:
    image: ghcr.io/onfood/business-bot:dev
    container_name: onfood-dev-business-bot
    <<: [*restart, *logging]
    depends_on: *go-depends
    env_file: ../env/backend.env
    networks: [onfood-dev]

  scheduler:
    image: ghcr.io/onfood/scheduler:dev
    container_name: onfood-dev-scheduler
    <<: [*restart, *logging]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    env_file: ../env/backend.env
    init: true
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    cpus: "2.0"
    mem_limit: 2g
    pids_limit: 256
    stop_grace_period: 30s
    tmpfs:
      - /tmp/onfood-media:rw,noexec,nosuid,nodev,size=1g,uid=65534,gid=65534,mode=0700
    healthcheck:
      test: ["CMD-SHELL", "pidof scheduler >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks: [onfood-dev]

  # ────────────────────────────────────────────────────────────────
  # Frontends (Next.js, standalone) — image built per-env with baked NEXT_PUBLIC_*
  # ────────────────────────────────────────────────────────────────
  eats:
    image: ghcr.io/onfood/eats:dev
    container_name: onfood-dev-eats
    <<: [*restart, *logging]
    depends_on: [eats-api]
    env_file: ../env/eats.env
    ports:
      - "127.0.0.1:3010:3000"
    networks: [onfood-dev]

  business:
    image: ghcr.io/onfood/business:dev
    container_name: onfood-dev-business
    <<: [*restart, *logging]
    depends_on: [business-api]
    env_file: ../env/business.env
    ports:
      - "127.0.0.1:3011:3001"
    networks: [onfood-dev]

  adminpanel:
    image: ghcr.io/onfood/adminpanel:dev
    container_name: onfood-dev-adminpanel
    <<: [*restart, *logging]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: ../env/adminpanel.env
    ports:
      - "127.0.0.1:3012:3000"
    networks: [onfood-dev]

volumes:
  pg_data:
    name: onfood_dev_pg_data
  minio_data:
    name: onfood_dev_minio_data

networks:
  onfood-dev:
    name: onfood_dev_internal
    driver: bridge
