name: qber

# Internal-only postgres + 5 Go services + 3 Next.js services.
# Frontends bind to 127.0.0.1:30XX so host nginx can reverse-proxy them.
# Bots + scheduler stay fully internal (no port exposure needed).

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-go-depends: &go-depends
  postgres:
    condition: service_healthy
  migrate:
    condition: service_completed_successfully

services:
  # ────────────────────────────────────────────────────────────────
  # Database
  # ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    <<: [*restart, *logging]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [qber]

  # ────────────────────────────────────────────────────────────────
  # Migrations (one-shot job, runs on every deploy)
  # ────────────────────────────────────────────────────────────────
  migrate:
    image: ghcr.io/onfood/migrations:dev
    <<: *logging
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    restart: "no"
    networks: [qber]

  # ────────────────────────────────────────────────────────────────
  # Backend (Go) — 5 services from 5 separate images
  # ────────────────────────────────────────────────────────────────
  # Backend binaries share one env file (single Config struct in code)
  customer-api:
    image: ghcr.io/onfood/backend-customer-api:dev
    <<: [*restart, *logging]
    depends_on: *go-depends
    env_file: ./env/backend.env
    ports:
      - "127.0.0.1:3020:8001"
    networks: [qber]

  business-api:
    image: ghcr.io/onfood/backend-business-api:dev
    <<: [*restart, *logging]
    depends_on: *go-depends
    env_file: ./env/backend.env
    ports:
      - "127.0.0.1:3021:8002"
    networks: [qber]

  customer-bot:
    image: ghcr.io/onfood/backend-customer-bot:dev
    <<: [*restart, *logging]
    depends_on: *go-depends
    env_file: ./env/backend.env
    networks: [qber]

  business-bot:
    image: ghcr.io/onfood/backend-business-bot:dev
    <<: [*restart, *logging]
    depends_on: *go-depends
    env_file: ./env/backend.env
    networks: [qber]

  scheduler:
    image: ghcr.io/onfood/backend-scheduler:dev
    <<: [*restart, *logging]
    depends_on: *go-depends
    env_file: ./env/backend.env
    networks: [qber]

  # ────────────────────────────────────────────────────────────────
  # Frontends (Next.js)
  # ────────────────────────────────────────────────────────────────
  customer:
    image: ghcr.io/onfood/customer:dev
    <<: [*restart, *logging]
    depends_on: [customer-api]
    env_file: ./env/customer.env
    ports:
      - "127.0.0.1:3010:3000"
    networks: [qber]

  business:
    image: ghcr.io/onfood/business:dev
    <<: [*restart, *logging]
    depends_on: [business-api]
    env_file: ./env/business.env
    ports:
      - "127.0.0.1:3011:3001"
    networks: [qber]

  adminpanel:
    image: ghcr.io/onfood/adminpanel:dev
    <<: [*restart, *logging]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: ./env/adminpanel.env
    ports:
      - "127.0.0.1:3012:3000"
    networks: [qber]

volumes:
  pg_data:
    name: qber_pg_data

networks:
  qber:
    name: qber_internal
    driver: bridge
